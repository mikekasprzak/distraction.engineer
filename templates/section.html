{% extends "base.html" %}

{% block content %}
<h1 class="title">
  {{ section.title }}
</h1>
{{section.content | safe}}
<ul>
  <li><a href="..">..</a></li>
  {% for page in section.pages %}
  <li>
    <a href="{{page.permalink | safe}}">{{page.title}}</a>
    {% if page.description %}
      <span> - {{page.description | safe}}</span>
    {% endif %}
  </li>
  {% endfor %}
</ul>
{% endblock content %}
