<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="alternate" type="application/atom+xml" title="Feed" href="/atom.xml"/>
  {% block feeds %}{% endblock %}

  <link rel="authorization_endpoint" href="https://indieauth.com/auth">
  <link rel="token_endpoint" href="https://tokens.indieauth.com/token">
  <link rel="microsub" href="https://aperture.p3k.io/microsub/722">
  <link rel="webmention" href="https://webmention.io/distraction.engineer/webmention" />
  <link rel="pingback" href="https://webmention.io/distraction.engineer/xmlrpc" />

{#
  <link rel="preload" as="font" href="/fonts/source-sans/VAR/SourceSans3VF-Regular.ttf.woff2" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" as="font" href="/fonts/source-sans/VAR/SourceSans3VF-Italic.ttf.woff2" type="font/woff2" crossorigin="anonymous">
#}

  <link rel="stylesheet" type="text/css" href="/style.css?version={{get_file_hash(path='/style.css', sha_type=256)}}">
  <link rel="stylesheet" type="text/css" href="/fonts.css?version={{get_file_hash(path='/fonts.css', sha_type=256)}}">
  <link rel="stylesheet" type="text/css" href="/print.css?version={{get_file_hash(path='/print.css', sha_type=256)}}">
  <title>{% block title %}{{config.title}}{% endblock %}</title>
</head>

<body>
  {% block header %}
  {# Navigation Header #}
  <header class="nav">
    <div><a class="logo" href="/">{{config.title}}</a></div>
  </header>
  {# Print Header #}
  <header class="print">
    <span class="logo">{{config.title}}</span>
  </header>
  {% endblock %}
  {% block section %}<section class="content">{% block content %}{% endblock %}</section>{% endblock %}
  {% block footer %}
  <footer class="hidden"></footer>
  {% endblock %}
</body>

</html>
